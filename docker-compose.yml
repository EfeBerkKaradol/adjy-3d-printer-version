services:
  postgres:
    image: postgres:16-alpine
    container_name: adjy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adjy
      POSTGRES_PASSWORD: adjy_dev_2024
      POSTGRES_DB: adjy_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adjy-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
