services:
  app:
    build: .
    container_name: adjy-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://adjy:adjy_dev_2024@postgres:5432/adjy_db"
      REDIS_URL: "redis://redis:6379"
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-production}"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: adjy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: adjy
      POSTGRES_PASSWORD: adjy_dev_2024
      POSTGRES_DB: adjy_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adjy-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
